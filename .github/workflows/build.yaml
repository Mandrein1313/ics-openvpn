name: Build Android APK

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: # เปิดให้กดสั่ง Build มือเองได้บนหน้าเว็บ GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive # ดึงโค้ด OpenVPN Submodule มาให้ครบ

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    - name: Configure Gradle Memory Limits
      run: |
        mkdir -p ~/.gradle
        echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m" >> ~/.gradle/gradle.properties
        echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m" >> gradle.properties

    - name: Accept Android SDK Licenses
      run: |
        # กดยอมรับสิทธิ์ใบอนุญาตของ Android SDK ทั้งหมดโดยอัตโนมัติเพื่อไม่ให้บิวด์ล่ม
        mkdir -p $ANDROID_HOME/licenses
        echo -e "\n8933bad161ad4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb74bf367b9fe3b9db37\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n84831b9409646a918e30573bab4c9c91346d8abd\n504667f4c0de7af1a06de9f4b1727b84351f2910\nf3174464c65f38e311ebd57de32572b95d144e38\nb1383f674c1eb3a77d226b61c1fcff3a62d5eaa1" > $ANDROID_HOME/licenses/android-sdk-license
        echo -e "\n85169173ad534a4e9e19d1c5d97f7424534ebd36" > $ANDROID_HOME/licenses/android-sdk-preview-license

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      env:
        _JAVA_OPTIONS: "-Xmx4096m"
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/build/outputs/apk/**/*.apk"
