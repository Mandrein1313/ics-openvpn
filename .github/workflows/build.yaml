name: Build Android APK

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: # เปิดให้กดสั่ง Build มือเองได้บนหน้าเว็บ GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive # ดึงโค้ด OpenVPN Submodule มาให้ครบ

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    - name: Setup Android SDK, NDK & CMake
      id: setup-android
      uses: android-actions/setup-android@v3
      with:
        ndk-version: '25.1.8937393'
        cmake-version: '3.22.1'

    - name: Configure Gradle Memory Limits
      run: |
        # อัปเกรดแรมขยายพื้นที่ให้ Java Heap Space เพื่อป้องกันการล่มตอนรวมไฟล์
        mkdir -p ~/.gradle
        echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m" >> ~/.gradle/gradle.properties
        echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m" >> gradle.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      env:
        ANDROID_NDK_ROOT: ${{ steps.setup-android.outputs.ndk-path }}
        # บังคับเพิ่มออปชันหน่วยความจำตอนสั่งรันตรงๆ อีกชั้นหนึ่ง
        _JAVA_OPTIONS: "-Xmx4096m"
      run: ./gradlew assembleDebug -Pandroid.ndkVersion=25.1.8937393 --no-daemon
