name: Build Android APK

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: # เปิดให้กดสั่ง Build มือเองได้

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive # สำคัญมาก! ต้องดึง submodule ออกมาด้วย

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    - name: Install NDK & CMake
      run: |
        echo "y" | $ANDROID_HOME/tools/bin/sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1"
        # หมายเหตุ: เวอร์ชัน NDK/CMake อาจต้องปรับให้ตรงกับที่ระบุใน build.gradle.kts ของโปรเจกต์

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: main/build/outputs/apk/debug/*.apk
