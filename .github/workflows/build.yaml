name: Build Android APK

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: # เปิดให้กดสั่ง Build มือเองได้บนหน้าเว็บ GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive # ดึงโค้ด OpenVPN Submodule มาให้ครบ

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    - name: Configure Gradle Memory Limits
      run: |
        mkdir -p ~/.gradle
        echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m" >> ~/.gradle/gradle.properties
        echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m" >> gradle.properties

    # ใช้ Action ตัวนี้จัดการยอมรับสิทธิ์ Android Licenses ทั้งหมดแบบ 100%
    - name: Accept Android Licenses
      uses: android-actions/setup-android@v3

    # สั่งติดตั้ง NDK เวอร์ชันที่ระบบบังคับเรียกหาล่วงหน้าผ่านเครื่องมือที่ปลอดภัย
    - name: Install Specific NDK
      run: |
        sdkmanager --install "ndk;30.0.14904198"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      env:
        _JAVA_OPTIONS: "-Xmx4096m"
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/build/outputs/apk/**/*.apk"
